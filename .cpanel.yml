---
deployment:
  tasks:
    # Lokasi web root. Ganti "public_html" kalau situs ada di subdomain/addon domain
    # (mis. $HOME/subdomain.namadomain.com). $HOME = /home/USER-cpanel otomatis.
    - export DEPLOYPATH=$HOME/public_html
    - /bin/mkdir -p $DEPLOYPATH

    # Server ini tidak punya rsync, jadi copy pakai tar (pipe create -> extract).
    # tar extract menimpa file yang sama, TAPI tidak menghapus file server yang
    # tidak ada di repo (config production, upload, log asli tetap aman).
    # Yang tidak perlu / tidak boleh ke web root dikecualikan di bawah.
    - >
      /usr/bin/tar -cf -
      --exclude='./.git'
      --exclude='./.github'
      --exclude='./.gitignore'
      --exclude='./.editorconfig'
      --exclude='./.claude'
      --exclude='./.cpanel.yml'
      --exclude='./readme.rst'
      --exclude='./license.txt'
      --exclude='./composer.json'
      --exclude='./composer.lock'
      --exclude='./database'
      --exclude='./application/config/production'
      ./ | /usr/bin/tar -xf - -C $DEPLOYPATH
