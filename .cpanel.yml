---
deployment:
  tasks:
    # Lokasi web root. Ganti "public_html" kalau situs ada di subdomain/addon domain
    # (mis. $HOME/subdomain.namadomain.com). $HOME = /home/USER-cpanel otomatis.
    - export DEPLOYPATH=$HOME/public_html
    - /bin/mkdir -p $DEPLOYPATH

    # Salin file repo -> web root. TANPA --delete biar file di server yang
    # tidak ada di git (config production, upload, log) tidak ikut terhapus.
    # File yang TIDAK boleh ketimpa / tidak perlu di server dikecualikan di bawah.
    - >
      /usr/bin/rsync -a
      --exclude='.git'
      --exclude='.github'
      --exclude='.gitignore'
      --exclude='.editorconfig'
      --exclude='.claude'
      --exclude='.cpanel.yml'
      --exclude='readme.rst'
      --exclude='license.txt'
      --exclude='composer.json'
      --exclude='composer.lock'
      --exclude='database/'
      --exclude='application/logs/'
      --exclude='application/cache/'
      --exclude='application/config/production/'
      ./ $DEPLOYPATH/
