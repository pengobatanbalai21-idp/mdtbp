# Izinkan .htaccess (mod_rewrite CI) di document root
<Directory /var/www/html>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

# Teruskan environment variable dari container ke PHP (dibaca getenv() di config)
PassEnv DB_HOST DB_USER DB_PASS DB_NAME BASE_URL CI_ENV
